name: Enable Dependency Graph

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  enable-dependency-graph:
    runs-on: ubuntu-latest
    steps:
      - name: Enable Dependency Graph and Vulnerability Alerts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Enable vulnerability alerts (requires dependency graph to be enabled)
          curl -L \
            -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/vulnerability-alerts

          echo "Dependency graph and vulnerability alerts have been enabled."
